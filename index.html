<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Calculadora de Envíos · Abuela Tata</title>

<meta name="theme-color" content="#7b5c47" />

<style>
:root{
  --bg:#f5efe6;
  --card:#fffaf4;
  --ink:#5b3f2d;
  --muted:#8b6f5b;
  --line:#e7d9cc;
  --accent:#7b5c47;
  --ok:#2f7f75;
  --danger:#b1453b;
  --shadow:0 10px 30px rgba(91,63,45,.10);
  --radius:18px;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Georgia, serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top, rgba(255,255,255,.65), rgba(255,255,255,0)),
    var(--bg);
}

.wrap{
  max-width:980px;
  margin:auto;
  padding:22px 16px 40px;
}

.hero{
  text-align:center;
  margin-bottom:18px;
}

.hero h1{
  margin:0 0 8px;
  font-size:clamp(26px, 4vw, 40px);
}

.hero p{
  margin:0;
  color:var(--muted);
  font-size:15px;
}

.grid{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:18px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}

.field{ margin-bottom:14px; }

.input,.select{
  width:100%;
  padding:13px;
  border-radius:14px;
  border:1px solid var(--line);
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

button{
  border:none;
  border-radius:14px;
  padding:14px;
  cursor:pointer;
}

.btn-primary{ background:var(--accent); color:#fff; }
.btn-secondary{ background:#efe3d7; }

.total{
  margin-top:12px;
  padding:16px;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--line);
}

.price{ font-size:30px; }

@media (max-width:860px){
  .grid{ grid-template-columns:1fr; }
}
</style>
</head>

<body>
<div class="wrap">

<div class="hero">
  <h1>Calculadora de Envíos</h1>
  <p>Origen: Marchena (41620)</p>
</div>

<div class="grid">

<section class="card">

<div class="field">
<select id="servicio" class="select">
<option value="BUSINESS_24_48">Business 24-48</option>
<option value="EXPRESS_19">Express 19</option>
<option value="GLS_14">GLS 14</option>
<option value="GLS_1030">GLS 10:30</option>
</select>
</div>

<div class="field">
<input id="cp" class="input" placeholder="Código postal">
</div>

<div class="field">
<input id="peso" class="input" placeholder="Peso kg">
</div>

<div class="btns">
<button class="btn-primary" onclick="calc()">Calcular</button>
<button class="btn-secondary" onclick="reset()">Limpiar</button>
</div>

</section>

<aside class="card">
<div class="total">
<div class="price" id="precio">—</div>
</div>
</aside>

</div>
</div>

<script>

const TARIFAS = {
  EXPRESS_19:{
    PROVINCIAL:{1:3.87},
    REGIONAL:{1:4.25},
    NACIONAL:{1:5.59}
  },
  GLS_14:{
    PROVINCIAL:{1:4.33},
    REGIONAL:{1:4.97},
    NACIONAL:{1:5.99}
  },
  GLS_1030:{
    PROVINCIAL:{1:5.56},
    REGIONAL:{1:7.48},
    NACIONAL:{1:7.97}
  },
  BUSINESS_24_48:{
    PROVINCIAL:{1:3.33},
    REGIONAL:{1:3.57},
    NACIONAL:{1:3.92}
  }
};

function zona(cp){
  if(cp.startsWith("41")) return "PROVINCIAL";
  if(["11","14","18","21","23","29","04"].includes(cp.slice(0,2))) return "REGIONAL";
  return "NACIONAL";
}

function calc(){
  const cp=document.getElementById("cp").value;
  const peso=parseFloat(document.getElementById("peso").value);
  const serv=document.getElementById("servicio").value;

  if(!cp || !peso) return;

  const z=zona(cp);
  const precio=TARIFAS[serv][z][1];

  document.getElementById("precio").innerText=precio.toFixed(2)+" €";
}

function reset(){
  document.getElementById("cp").value="";
  document.getElementById("peso").value="";
  document.getElementById("precio").innerText="—";
}

</script>

</body>
</html>
